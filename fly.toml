# fly.toml app configuration file generated for doctor-appointment on 2024-12-13T21:21:35+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'doctor-appointment'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
